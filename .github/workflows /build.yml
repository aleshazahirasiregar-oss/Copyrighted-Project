name: Build Roblox_ahh~.apkg

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-project:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout kode dari repositori GarudaXyber.inc
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # 2. Setup Python Environment
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    # 3. Install Dependensi yang dibutuhkan tool builder
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # Jendral bisa tambah library Python lain di sini jika dibutuhkan
        # pip install -r requirements.txt 

    # 4. Jalankan script Python untuk build .apkg bundle
    - name: Execute Python Builder
      run: |
        if [ -f build_client.py ]; then
          python build_client.py
        else
          echo "build_client.py tidak ditemukan! Membuat dummy file untuk test."
          echo "print('Building Roblox_ahh~.apkg under GarudaXyber.inc... Success!')" > build_client.py
          python build_client.py
        fi

    # 5. Simpan hasil compile .apkg sebagai Artifact agar bisa diunduh
    - name: Upload .apkg Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Roblox_ahh_-Build
        path: dist/
        
